<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Movie List</title>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico">
  
  <style>
    body { 
      font-family: Arial; 
      max-width: 800px; 
      margin: auto; 
    }

    input { 
      width: 100%; 
      padding: 10px; 
      margin: 10px 0; 
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .controls select {
      flex: 1;
      padding: 8px;
    }

    .movie { 
      padding: 12px; 
      border-bottom: 1px solid #ccc; 
      border-radius: 8px;
      margin: 10px 0;
      background: #f5f5f5;
      transition: 0.2s;
    }

    .movie:hover {
      background: #eaeaea;
    }

    .title { 
      font-weight: bold; 
      font-size: 16px;
      margin-bottom: 5px;
    }

    /* ✅ 标签样式优化 */
    .tags {
      margin-top: 6px;
    }

    .tags span {
      display: inline-block;
      margin-right: 6px;
      padding: 3px 8px;
      background: #e0e0e0;
      border-radius: 12px;
      font-size: 12px;
      color: #444;
      cursor: pointer;
      transition: 0.2s;
    }

    .tags span:hover {
      background: #d0d0d0;
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🎬 Movie Search</h1>

<input id="search" placeholder="搜索电影 / 标签..." />

<div class="controls">

  <!-- 大类别 -->
  <select id="categoryFilter">
    <option value="">全部大类</option>
    <option value="action">🎬 动作</option>
    <option value="romance">💕 爱情</option>
    <option value="sci-fi">🚀 科幻</option>
    <option value="comedy">😂 喜剧</option>
    <option value="animation">🎨 动画</option>
    <option value="documentary">📝 纪录</option>
    <option value="family">🧑‍🧑‍🧒 家庭</option>
    <option value="war">🔫 战争</option>
    <option value="chinese">🀄️ 中文</option>
    <option value="drama">🎦 剧情</option>
  </select>

  <!-- 小类别 -->
  <select id="tagFilter">
    <option value="">全部标签</option>
  </select>

  <!-- 排序 -->
  <select id="sortSelect">
    <option value="">默认排序</option>
    <option value="rating_desc">评分从高到低</option>
    <option value="rating_asc">评分从低到高</option>
  </select>

</div>

<div id="list"></div>

<script>
window.onload = () => {
  const list = document.getElementById("list");
  const input = document.getElementById("search");
  const tagFilter = document.getElementById("tagFilter");
  const sortSelect = document.getElementById("sortSelect");
  const categoryFilter = document.getElementById("categoryFilter");

  let movies = [];

  fetch("movies.json")
    .then(res => res.json())
    .then(data => {
      movies = data;
      initTags();
      render();
    });

  function initTags() {
    const tags = new Set();
    movies.forEach(m => (m.tags || []).forEach(t => tags.add(t)));

    tags.forEach(tag => {
      const option = document.createElement("option");
      option.value = tag;
      option.textContent = tag;
      tagFilter.appendChild(option);
    });
  }

  function render() {
    const keyword = input.value.toLowerCase();
    const selectedTag = tagFilter.value;
    const selectedCategory = categoryFilter.value;
    const sortType = sortSelect.value;

    let filtered = movies.filter(m => {
      const title = (m.title || "").toLowerCase();
      const tags = (m.tags || []);

      return (
        (title.includes(keyword) || tags.join("").includes(keyword)) &&
        (!selectedTag || tags.includes(selectedTag)) &&
        (!selectedCategory || m.category === selectedCategory)
      );
    });

    if (sortType === "rating_desc") {
      filtered.sort((a, b) => b.rating - a.rating);
    } else if (sortType === "rating_asc") {
      filtered.sort((a, b) => a.rating - b.rating);
    }

    list.innerHTML = "";

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">😢 没有找到匹配的电影</div>`;
      return;
    }

    filtered.forEach(m => {
      const div = document.createElement("div");
      div.className = "movie";

      div.innerHTML = `
        <div class="title">${m.title} (${m.year})</div>
        <div>评分：${m.rating || "暂无"}</div>
        <div class="tags">
          ${(m.tags || []).map(t => 
            `<span onclick="quickFilter('${t}')">#${t}</span>`
          ).join("")}
        </div>
      `;

      list.appendChild(div);
    });
  }

  // ✅ 点击标签快速筛选
  window.quickFilter = function(tag) {
    tagFilter.value = tag;
    render();
  };

  input.addEventListener("input", render);
  tagFilter.addEventListener("change", render);
  sortSelect.addEventListener("change", render);
  categoryFilter.addEventListener("change", render);
};
</script>

</body>
</html>
