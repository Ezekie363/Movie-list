<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Movie List</title>
  <style>
    body { 
      font-family: Arial; 
      max-width: 800px; 
      margin: auto; 
    }

    input, select { 
      width: 100%; 
      padding: 10px; 
      margin: 10px 0; 
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .controls select {
      flex: 1;
    }

    .movie { 
      padding: 12px; 
      border-bottom: 1px solid #ccc; 
      border-radius: 8px;
      margin: 10px 0;
      background: #f5f5f5;
      transition: 0.2s;
    }

    .movie:hover {
      background: #eaeaea;
    }

    .title { 
      font-weight: bold; 
      font-size: 16px;
    }

    .tags span {
      margin-right: 6px;
      color: #666;
    }
  </style>
</head>
<body>

<h1>🎬 Movie Search</h1>

<input id="search" placeholder="搜索电影 / 标签..." />

<div class="controls">

  <select id="categoryFilter">
    <option value="">全部大类</option>
    <option value="action">🎬 动作</option>
    <option value="romance">💕 爱情</option>
    <option value="sci-fi">🚀 科幻</option>
    <option value="comedy">😂 喜剧</option>
    <option value="animation">🎨 动画</option>
    <option value="documentary">📝 纪录</option>
    <option value="family">🧑‍🧑‍🧒 家庭</option>
    <option value="war">🔫 战争</option>
    <option value="chinese">🀄️ 中文</option>
    <option value="drama">🎦 剧情</option>
  </select>
  <select id="tagFilter">
    <option value="">全部类型</option>
  </select>

  <select id="sortSelect">
    <option value="">默认排序</option>
    <option value="rating_desc">评分从高到低</option>
    <option value="rating_asc">评分从低到高</option>
  </select>
</div>

<div id="list"></div>

<script>
const list = document.getElementById("list");
const input = document.getElementById("search");
const tagFilter = document.getElementById("tagFilter");
const sortSelect = document.getElementById("sortSelect");

let movies = [];

/* 读取 JSON */
fetch("movies.json")
  .then(res => res.json())
  .then(data => {
    movies = data || [];
    initTags();
    render();
  })
  .catch(err => {
    console.error("加载失败:", err);
    list.innerHTML = "<p>⚠️ 数据加载失败，请检查 movies.json</p>";
  });

/* 初始化标签 */
function initTags() {
  const tags = new Set();

  movies.forEach(m => {
    (m.tags || []).forEach(t => tags.add(t));
  });

  tags.forEach(tag => {
    const option = document.createElement("option");
    option.value = tag;
    option.textContent = tag;
    tagFilter.appendChild(option);
  });
}

/* 渲染函数 */
function render() {
  const keyword = (input.value || "").toLowerCase();
  const selectedTag = tagFilter.value;
  const sortType = sortSelect.value;

  let filtered = movies.filter(m => {
    const title = (m.title || "").toLowerCase();
    const tags = (m.tags || []);

    const matchKeyword =
      title.includes(keyword) ||
      tags.join("").includes(keyword);

    const matchTag =
      !selectedTag || tags.includes(selectedTag);

    return matchKeyword && matchTag;
  });

  /* 排序 */
  if (sortType === "rating_desc") {
    filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (sortType === "rating_asc") {
    filtered.sort((a, b) => (a.rating || 0) - (b.rating || 0));
  }

  /* 渲染 */
  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = "<p>😢 没有找到结果</p>";
    return;
  }

  filtered.forEach(m => {
    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `
      <div class="title">${m.title} (${m.year})</div>
      <div>评分：${m.rating || "暂无"}</div>
      <div class="tags">
        ${(m.tags || []).map(t => `<span>#${t}</span>`).join("")}
      </div>
    `;

    list.appendChild(div);
  });
}

/* 监听 */
input.addEventListener("input", render);
tagFilter.addEventListener("change", render);
sortSelect.addEventListener("change", render);
</script>

</body>
</html>
