<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Movie List</title>

  <style>
    body { 
      font-family: Arial; 
      max-width: 800px; 
      margin: auto; 
    }

    input { 
      width: 100%; 
      padding: 10px; 
      margin: 10px 0; 
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .controls select {
      flex: 1;
      padding: 8px;
    }

    .movie { 
      padding: 12px; 
      border-bottom: 1px solid #ccc; 
      border-radius: 8px;
      margin: 10px 0;
      background: #f5f5f5;
      cursor: pointer;
      transition: 0.2s;
    }

    .movie:hover {
      background: #eaeaea;
    }

    .title { 
      font-weight: bold; 
      font-size: 16px;
    }

    .tags span {
      margin-right: 6px;
      color: #666;
      font-size: 12px;
    }

    .details {
      margin-top: 8px;
      font-size: 13px;
      color: #444;
      display: none;
    }

    .details div {
      margin: 4px 0;
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🎬 Movie Search</h1>

<input id="search" placeholder="搜索电影 / 标签..." />

<div class="controls">

  <select id="categoryFilter">
    <option value="">全部大类</option>
    <option value="action">🎬 动作</option>
    <option value="romance">💕 爱情</option>
    <option value="sci-fi">🚀 科幻</option>
    <option value="comedy">😂 喜剧</option>
    <option value="animation">🎨 动画</option>
    <option value="documentary">📝 纪录</option>
    <option value="family">🧑‍🧑‍🧒 家庭</option>
    <option value="war">🔫 战争</option>
    <option value="chinese">🀄️ 中文</option>
    <option value="drama">🎦 剧情</option>
  </select>

  <select id="tagFilter">
    <option value="">全部标签</option>
  </select>

  <select id="sortSelect">
    <option value="">默认排序</option>
    <option value="rating_desc">评分从高到低</option>
    <option value="rating_asc">评分从低到高</option>
  </select>

</div>

<div id="list"></div>

<script>
window.onload = () => {
  const list = document.getElementById("list");
  const input = document.getElementById("search");
  const tagFilter = document.getElementById("tagFilter");
  const sortSelect = document.getElementById("sortSelect");
  const categoryFilter = document.getElementById("categoryFilter");

  let movies = [];

  fetch("movies.json?t=" + Date.now())
    .then(res => res.json())
    .then(data => {
      movies = data;
      initTags();
      render();
    });

  function initTags() {
    const tags = new Set();
    movies.forEach(m => (m.tags || []).forEach(t => tags.add(t)));

    tags.forEach(tag => {
      const option = document.createElement("option");
      option.value = tag;
      option.textContent = tag;
      tagFilter.appendChild(option);
    });
  }

  function render() {
    const keyword = input.value.toLowerCase();
    const selectedTag = tagFilter.value;
    const selectedCategory = categoryFilter.value;
    const sortType = sortSelect.value;

    let filtered = movies.filter(m => {
      const title = (m.title || "").toLowerCase();
      const tags = (m.tags || []);

      return (
        (title.includes(keyword) || tags.join("").includes(keyword)) &&
        (!selectedTag || tags.includes(selectedTag)) &&
        (!selectedCategory || m.category === selectedCategory)
      );
    });

    if (sortType === "rating_desc") {
      filtered.sort((a, b) => b.rating - a.rating);
    } else if (sortType === "rating_asc") {
      filtered.sort((a, b) => a.rating - b.rating);
    }

    list.innerHTML = "";

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">没有找到电影 😢</div>`;
      return;
    }

    filtered.forEach(m => {
      const div = document.createElement("div");
      div.className = "movie";

      div.innerHTML = `
        <div class="title">${m.title} (${m.year})</div>
        <div>评分：${m.rating}</div>

        <div class="tags">
          ${(m.tags || []).map(t => `<span>#${t}</span>`).join("")}
        </div>

        <div class="details">
          <div>🎬 分类：${m.category || "未知"}</div>
          <div>🎭 类型：${m.genre || "未知"}</div>
          <div>🎦 导演：${m.director || "未知"}</div>
          <div>👥 主演：${m.actors || "未知"}</div>
        </div>
      `;

      // 👉 点击展开 / 收起
      div.addEventListener("click", () => {
        const details = div.querySelector(".details");
        details.style.display = 
          details.style.display === "block" ? "none" : "block";
      });

      list.appendChild(div);
    });
  }

  input.addEventListener("input", render);
  tagFilter.addEventListener("change", render);
  sortSelect.addEventListener("change", render);
  categoryFilter.addEventListener("change", render);
};
</script>

</body>
</html>
