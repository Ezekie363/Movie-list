name: 🎬 Add Movie Review
description: 提交电影评价
title: "[Review] 电影名"
labels: review

body:
  - type: input
    id: movie
    attributes:
      label: 🎬 电影名称（必须和库中一致）
      placeholder: 例如：Inception 或 盗梦空间
    validations:
      required: true

  - type: input
    id: rating
    attributes:
      label: ⭐ 你的评分（1-10）
      placeholder: 8.5

  - type: textarea
    id: content
    attributes:
      label: 💬 评价内容
      placeholder: 写下你的真实观后感
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 👤 昵称
      placeholder: 你的名字（可填 GitHub 名）
