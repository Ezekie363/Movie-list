name: "🎬 电影评价"
description: "提交一条电影评价，会自动展示到网站"
title: "[影评] "
labels: ["review"]

body:
  - type: input
    id: movie
    attributes:
      label: "🎬 电影名称"
      description: "请输入完整电影名"
      placeholder: "例如：盗梦空间 Inception"
    validations:
      required: true

  - type: input
    id: rating
    attributes:
      label: "⭐ 评分（1-10）"
      description: "填写评分数字"
      placeholder: "例如：9"
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: "📝 评价内容（附带你的用户名哦）"
      description: "写下你的观后感"
      placeholder: "例如：小明：剧情非常烧脑，但结构严谨，非常值得二刷"
    validations:
      required: true
