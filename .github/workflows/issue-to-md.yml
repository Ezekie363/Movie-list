name: issue-to-md

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: Create markdown from issue
        run: |
          body="${{ github.event.issue.body }}"

          mkdir -p reviews

          # 提取字段
          movie=$(echo "$body" | grep "🎬 电影名称" -A1 | tail -n1)
          rating=$(echo "$body" | grep "⭐ 评分" -A1 | tail -n1)
          content=$(echo "$body" | grep "📝 评价内容" -A5 | tail -n+2)

          movie=$(echo "$movie" | xargs)
          rating=$(echo "$rating" | xargs)

          safe_title=$(echo "$movie" | tr -d '[]:/\\?*"<>|' | tr ' ' '_')

          file="reviews/${safe_title}.md"

          echo "📄 Creating file: $file"

          echo "title: $movie" > "$file"
          echo "rating: $rating" >> "$file"
          echo "review: |" >> "$file"
          echo "$content" >> "$file"

      - name: 提交文件
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reviews/
          git commit -m "auto: add review from issue" || echo "No changes"
          git push
