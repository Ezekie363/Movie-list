name: Issue to Markdown

on:
  issues:
    types: [opened]

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create markdown file from issue
        run: |
          title="${{ github.event.issue.title }}"
          body="${{ github.event.issue.body }}"

          # 生成文件名（去空格）
          filename=$(echo "$title" | tr ' ' '-' | tr -cd '[:alnum:]-')

          # 默认分类（你可以后面优化）
          category="action"

          mkdir -p data/$category

          echo "$body" > data/$category/$filename.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Add movie from issue" || echo "No changes"
          git push
