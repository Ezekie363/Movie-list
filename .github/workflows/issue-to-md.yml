name: issue-to-md

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: Create markdown from issue
        run: |
          title="${{ github.event.issue.title }}"
          body="${{ github.event.issue.body }}"

          echo "📌 Issue Title: $title"

          # ✅ 创建目录（防止不存在）
          mkdir -p reviews

          # ✅ 清洗文件名（去掉特殊字符）
          safe_title=$(echo "$title" | sed 's/[^a-zA-Z0-9一-龥_-]//g')

          file="reviews/${safe_title}.md"

          echo "📄 Creating file: $file"

          echo "# 🎬 $title" > "$file"
          echo "" >> "$file"
          echo "$body" >> "$file"

      - name: 提交文件
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reviews/
          git commit -m "auto: add review from issue" || echo "No changes"
          git push
