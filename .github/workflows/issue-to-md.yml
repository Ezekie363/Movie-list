name: Issue to Markdown

on:
  issues:
    types: [opened]

permissions:
  contents: write   # ✅ 关键：允许push代码

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create markdown file from issue
        run: |
          title="${{ github.event.issue.title }}"
          body="${{ github.event.issue.body }}"

          echo "📌 Issue Title: $title"

          # ✅ 文件名（支持中文 + 去空格）
          filename=$(echo "$title" | sed 's/[[:space:]]/-/g')

          # ❗ 默认分类（后面可以升级自动分类）
          category="action"

          mkdir -p data/$category

          filepath="reviews/${title}.md"

          echo "📄 Creating file: $filepath"

          echo "$body" > "$filepath"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "✨ Add movie from issue: ${{ github.event.issue.title }}" || echo "No changes"

          git push
