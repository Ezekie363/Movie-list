name: issue-to-md

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create markdown
        run: |
          body="${{ github.event.issue.body }}"

          mkdir -p reviews

          echo "📌 RAW:"
          echo "$body"

          # =========================
          # ✅ 核心修复（跳过空行）
          # =========================

          movie=$(echo "$body" | grep -A2 "电影名称" | tail -n1)
          rating=$(echo "$body" | grep -A2 "评分" | tail -n1)

          # 评价内容（取最后一个 section）
          content=$(echo "$body" | awk '
            /评价内容/ {flag=1; next}
            flag
          ')

          # 清理
          movie=$(echo "$movie" | sed '/^$/d' | xargs)
          rating=$(echo "$rating" | sed '/^$/d' | xargs)
          content=$(echo "$content" | sed '/^$/d')

          echo "🎬 movie=$movie"
          echo "⭐ rating=$rating"
          echo "📝 content=$content"

          # ❗ 防止空值
          if [ -z "$movie" ]; then
            echo "❌ movie 解析失败"
            exit 1
          fi

          safe_title=$(echo "$movie" | tr -d '[]:/\\?*"<>|' | tr ' ' '_')

          file="reviews/${safe_title}.md"

          echo "📄 $file"

          echo "title: $movie" > "$file"
          echo "rating: $rating" >> "$file"
          echo "review: |" >> "$file"
          echo "$content" >> "$file"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reviews/
          git commit -m "auto: review" || echo "no changes"
          git push
