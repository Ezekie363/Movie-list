name: issue-to-md

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: Create markdown from issue
        run: |
          body="${{ github.event.issue.body }}"

          mkdir -p reviews

          echo "📌 原始 Issue 内容："
          echo "$body"

          # ✅ 更宽松匹配（适配 ### 标题）
          movie=$(echo "$body" | awk '/电影名称/{getline; print}')
          rating=$(echo "$body" | awk '/评分/{getline; print}')
          content=$(echo "$body" | awk '/评价内容/{flag=1; next} flag')

          # ✅ 清理
          movie=$(echo "$movie" | xargs)
          rating=$(echo "$rating" | xargs)
          content=$(echo "$content" | sed '/^$/d')

          echo "🎬 movie=$movie"
          echo "⭐ rating=$rating"
          echo "📝 content=$content"

          # ❗ 防止解析失败
          if [ -z "$movie" ]; then
            echo "❌ movie 解析失败"
            exit 1
          fi

          safe_title=$(echo "$movie" | tr -d '[]:/\\?*"<>|' | tr ' ' '_')

          file="reviews/${safe_title}.md"

          echo "📄 Creating file: $file"

          echo "title: $movie" > "$file"
          echo "rating: $rating" >> "$file"
          echo "review: |" >> "$file"
          echo "$content" >> "$file"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reviews/
          git commit -m "auto: add review from issue" || echo "No changes"
          git push
