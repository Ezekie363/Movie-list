name: Generate Movie JSON

on:
  push:

permissions:
  contents: write   # ✅ 关键：允许自动 push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4   # ✅ 升级版本

      - name: 设置 Python
        uses: actions/setup-python@v5   # ✅ 升级版本
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install pyyaml

      - name: 生成 movies.json
        run: python scripts/generate_json.py

      - name: 提交 JSON 文件
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/movies.json
          git commit -m "auto: update movies.json" || echo "No changes"
          git push
