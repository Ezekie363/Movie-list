name: Generate Movie JSON

on:
  workflow_run:
    workflows: ["issue-to-md"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install pyyaml

      - name: 生成 movies.json
        run: python scripts/generate_json.py

      - name: 生成 reviews.json
        run: python scripts/generate_reviews.py   # ✅ 注意这个名字

      - name: 提交 JSON 文件
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/movies.json docs/reviews.json
          git commit -m "auto: update json files" || echo "No changes"
          git push
