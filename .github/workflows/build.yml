name: Generate Movie JSON

on:
  push:
    paths:
      - "data/**"       # ✅ 关键：data变动就触发
      - "reviews/**"    # （可选）影评变动也触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install pyyaml

      - name: 生成 movies.json
        run: python scripts/generate_json.py

      - name: 生成 reviews.json
        run: python scripts/generate_reviews.py

      - name: 提交 JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/movies.json docs/reviews.json
          git commit -m "auto: update json" || echo "No changes"
          git push
