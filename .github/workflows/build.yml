name: Build Movies JSON

on:
  push:
    paths:
      - 'data/**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Run script
        run: python scripts/generate_json.py

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/movies.json
          git commit -m "update movies.json" || echo "no changes"
          git push
